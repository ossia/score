name: BSDs
on: push

jobs:
  build_bsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          pwd
          ls -lah
          whoami
          env
          freebsd-version

          ./ci/freebsd.deps.sh

        run: |
          ./ci/freebsd.build.sh
