name: Ubuntu build
on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { deploy: false, distro: ubuntu.noble,  image: noble,  CMAKEFLAGS: "-DSCORE_PCH=1",         CC: gcc-14,              CXX: g++-14,              CFLAGS: "-O0", LDFLAGS: "-fuse-ld=lld"   , PKGS: "" }
          - { deploy: true,  distro: ubuntu.noble,  image: noble,  CMAKEFLAGS: "-DCMAKE_UNITY_BUILD=1", CC: clang-19,            CXX: clang++-19,          CFLAGS: "-O3", LDFLAGS: "-fuse-ld=lld-19", PKGS: "" }
          - { deploy: false, distro: ubuntu.plucky, image: plucky, CMAKEFLAGS: "-DSCORE_PCH=1",         CC: gcc,                 CXX: g++,                 CFLAGS: "-O0", LDFLAGS: ""               , PKGS: "" }
          - { deploy: true,  distro: ubuntu.plucky, image: plucky, CMAKEFLAGS: "-DCMAKE_UNITY_BUILD=1", CC: clang-20,            CXX: clang++-20,          CFLAGS: "-O3", LDFLAGS: "-fuse-ld=lld-20", PKGS: "" }
          - { deploy: false, distro: ubuntu.2604,   image: 26.04,  CMAKEFLAGS: "-DSCORE_PCH=1",         CC: gcc,                 CXX: g++,                 CFLAGS: "-O0", LDFLAGS: ""               , PKGS: "" } # GCC comes with build-essential
          - { deploy: true,  distro: ubuntu.2604,   image: 26.04,  CMAKEFLAGS: "-DCMAKE_UNITY_BUILD=1", CC: clang,               CXX: clang++,             CFLAGS: "-O3", LDFLAGS: "-fuse-ld=lld"   , PKGS: "clang lld" }
          - { deploy: false, distro: ubuntu.2604,   image: 26.04,  CMAKEFLAGS: "-DSCORE_PCH=1",         CC: gcc-16,              CXX: g++-16,              CFLAGS: "-O0", LDFLAGS: ""               , PKGS: "gcc-16 g++-16" }
          - { deploy: true,  distro: ubuntu.2604,   image: 26.04,  CMAKEFLAGS: "-DCMAKE_UNITY_BUILD=1", CC: clang-22,            CXX: clang++-22,          CFLAGS: "-O3", LDFLAGS: "-fuse-ld=lld-22", PKGS: "clang-22 lld-22" }

    container:
      image: ubuntu:${{ matrix.image }}

    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -qq --force-yes git

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Dependencies
        env:
          PKGS: ${{ matrix.PKGS }}
        run: |
          ./ci/${{ matrix.distro }}.deps.sh

      - name: Build
        env:
          CMAKEFLAGS: ${{ matrix.CMAKEFLAGS }}
          CC: ${{ matrix.CC }}
          CXX: ${{ matrix.CXX }}
          CFLAGS: ${{ matrix.CFLAGS }}
          LDFLAGS: ${{ matrix.LDFLAGS }}
        run: |
          ./ci/${{ matrix.distro }}.build.sh

      - name: Deploy
        run: |
          ./ci/${{ matrix.distro }}.deploy.sh

      - name: Upload build
        uses: actions/upload-artifact@v4
        if: matrix.deploy
        with:
          name: ${{ matrix.distro }}-amd64
          path: |
            *.deb

      - name: Continuous
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          name: "Continuous"
          tag_name: "continuous"
          body: ""
          append_body: true
          generate_release_notes: false
          files: |
            *.deb

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ""
          append_body: true
          generate_release_notes: false
          files: |
            *.deb
