name: WASM
on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: WebAssembly
    # Build on the same image the wasm SDK is built on (ubuntu-24.04), so the
    # prebuilt qt6-host tools find a matching system ICU. The old archlinux
    # container shipped a too-new ICU (78) for the SDK's host tools (needs 74/76).
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          persist-credentials: false
          fetch-depth: 0

      - name: Dependencies
        run: |
          ./ci/wasm.deps.sh

      - name: Build
        run: |
          ./ci/wasm.build.sh

      - name: Deploy
        run: |
          ./ci/wasm.deploy.sh

      - name: Push changes
        uses: ad-m/github-push-action@master
        if: github.event_name != 'pull_request'
        with:
          github_token: ${{ secrets.API_TOKEN_GITHUB }}
          branch: 'main'
          force: true
          directory: './site'
          repository: 'ossia/score-web'
